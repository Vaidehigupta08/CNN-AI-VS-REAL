version: "3.8"

services:
  # ---- FastAPI Backend ----
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: cnn-api
    ports:
      - "8000:8000"
    volumes:
      - ./cnn_ai_real_model_fixed.h5:/app/cnn_ai_real_model_fixed.h5
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---- Streamlit Frontend ----
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: cnn-frontend
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped
